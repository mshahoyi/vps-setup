---
# Where repos get cloned
dev_dir: "{{ ansible_env.HOME }}/dev"

# Repos to clone (owner/name). Cloned over HTTPS using gh's credential helper,
# so private repos work as long as `gh auth login` succeeded in bootstrap.
github_repos:
  - z3research/colm2026
  - z3research/auditing-agents
  - attolabs/layali
  - attolabs/attolabs-web

# Base apt packages
apt_packages:
  - tmux
  - git
  - git-lfs
  - curl
  - wget
  - unzip
  - build-essential
  - ca-certificates
  - ripgrep
  - fd-find
  - fzf
  - htop
  - jq
  - tree
  - python3-pip
  - python3-venv
  - sox # audio recording for Claude Code voice mode

# Node major version (for Claude Code, etc.)
node_major: "22"

# pnpm is installed via corepack (ships with Node). This is the supply-chain
# release-age cooldown (in MINUTES) applied globally: refuse npm package versions
# younger than this, so freshly-published hijacked versions are dodged. 14400 = 10 days.
pnpm_minimum_release_age: "14400"

# ----------------------------------------------------------------- dotfiles --
# This repo's checkout on the box (bootstrap clones here). Single-file dotfiles
# are symlinked from it into $HOME, so editing one on the box edits the repo file
# -> just `git -C ~/vps-setup commit && push` to version the change.
repo_dir: "{{ ansible_env.HOME }}/vps-setup"

dotfiles:
  - { src: files/tmux.conf, dest: .tmux.conf }

# Whole-directory config repos, cloned in place to `dest` (like ~/.claude on your
# laptop). Existing git clones are pulled --ff-only; an existing non-git dir (e.g.
# created by running `claude` first) is adopted without touching gitignored
# runtime files (credentials, history).
config_repos:
  - { url: "https://github.com/mshahoyi/claude.git", dest: "{{ ansible_env.HOME }}/.claude" }

# Global git identity (edit to taste)
git_user_name: "mshahoyi"
git_user_email: "muyabb@gmail.com"

# ----------------------------------------------------------------- hardening -
# SSH login keys are pulled from this GitHub user's public keys
# (https://github.com/<user>.keys). You must hold the matching private key
# locally, or you'll lock yourself out. If no keys are found there, the playbook
# leaves password auth ENABLED and warns instead of locking you out.
github_keys_user: mshahoyi

# Disable SSH password auth + root password login (key-only). Only takes effect
# if a key was successfully installed from GitHub above.
disable_password_auth: true

# Optional: also create a non-root sudo user (key-only). Off by default because
# the unattended automation + repo clones currently run as root. Flip on once
# you restructure to run automation as this user.
create_admin_user: false
admin_user: mo

# ----------------------------------------------------------------- tailscale -
# Put SSH on a private WireGuard mesh so port 22 can leave the public internet.
# After install, authenticate once with `tailscale up` (prints a URL to approve
# in your browser), OR pass an auth key non-interactively at runtime:
#   TAILSCALE_AUTHKEY=tskey-... ansible-playbook ... --tags tailscale
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') | default('', true) }}"
tailscale_hostname: contabo
# OPT-IN lockdown: only set true AFTER confirming you can SSH over the tailnet,
# or you'll cut public SSH (recover via Contabo's web console).
tailscale_lock_ssh: false
# OPT-IN recovery channel: SSH authenticated by tailnet identity (immune to
# key/perms/fail2ban lockouts). Requires an "accept" ssh rule in the tailnet ACL
# and rotates the host key (clients re-trust once). See tasks/tailscale.yml.
tailscale_ssh: false

# Fine-grained PAT for UNATTENDED git access (optional). NEVER hardcode/commit it.
# Pass at runtime so it's only ever in memory + a 0600 file:
#   GITHUB_PAT=github_pat_xxx ansible-playbook -i inventory.ini site.yml --tags hardening
# See SECURITY.md for how to scope it (least privilege + short expiry).
github_pat: "{{ lookup('env', 'GITHUB_PAT') | default('', true) }}"

# ------------------------------------------------------- layali dev services -
# Keep the Layali dev servers always-on via pm2 (tasks/layali-services.yml):
# Metro :8081, admin dev :5173, admin prod :5174, Storybook :6006 — auto-restart
# + resurrect on reboot. Needs the layali repo cloned + its .env secrets present
# (provisioned out of band). Set false to skip.
layali_services_enabled: true
