---
- name: Provision dev VPS
  hosts: all
  become: true
  gather_facts: true

  vars:
    ssh_port: 22

  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

  tasks:
    # ---------------------------------------------------------------- base ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [base]

    - name: Install base apt packages
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
      tags: [base]

    - name: Symlink dotfiles from the repo into $HOME
      ansible.builtin.file:
        src: "{{ repo_dir }}/{{ item.src }}"
        dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ dotfiles }}"
      tags: [base, dotfiles]

    # ------------------------------------------------------------- git cfg ---
    - name: Configure global git identity
      ansible.builtin.command: "git config --global {{ item.key }} {{ item.value | quote }}"
      loop:
        - { key: "user.name", value: "{{ git_user_name }}" }
        - { key: "user.email", value: "{{ git_user_email }}" }
        - { key: "init.defaultBranch", value: "main" }
      changed_when: false
      tags: [git]

    - name: Initialize Git LFS global filters
      ansible.builtin.command: git lfs install --skip-repo
      changed_when: false
      tags: [git]

    # ---------------------------------------------------- node + claude code -
    - name: Check whether Node is installed
      ansible.builtin.command: node --version
      register: node_v
      failed_when: false
      changed_when: false
      tags: [node]

    - name: Install Node from NodeSource
      ansible.builtin.shell: |
        set -euo pipefail
        curl -fsSL https://deb.nodesource.com/setup_{{ node_major }}.x | bash -
        apt-get install -y nodejs
      args:
        executable: /bin/bash
      when: node_v.rc != 0
      tags: [node]

    - name: Check whether pnpm is installed
      ansible.builtin.command: pnpm --version
      register: pnpm_v
      failed_when: false
      changed_when: false
      tags: [node, pnpm]

    - name: Install pnpm via corepack and configure PNPM_HOME
      ansible.builtin.shell: |
        set -euo pipefail
        corepack enable pnpm
        corepack prepare pnpm@latest --activate
        pnpm setup   # creates $PNPM_HOME (+bin) and adds it to the shell profile
      args:
        executable: /bin/bash
      when: pnpm_v.rc != 0
      tags: [node, pnpm]

    # pnpm guards `config set` behind "$PNPM_HOME/bin must be in PATH", so the
    # env below is required even though `pnpm setup` already persisted it to the
    # shell profile (that profile isn't sourced for this non-interactive task).
    - name: Harden pnpm against supply-chain attacks (release-age cooldown)
      ansible.builtin.command: pnpm config set --global {{ item.key }} {{ item.value }}
      loop:
        - { key: minimumReleaseAge, value: "{{ pnpm_minimum_release_age }}" }
        - { key: minimumReleaseAgeStrict, value: "false" }
      environment:
        PNPM_HOME: "{{ ansible_env.HOME }}/.local/share/pnpm"
        PATH: "{{ ansible_env.HOME }}/.local/share/pnpm/bin:{{ ansible_env.PATH }}"
      changed_when: false # declaratively pins fixed values; idempotent
      tags: [node, pnpm]

    - name: Check whether Claude Code is installed
      ansible.builtin.command: which claude
      register: claude_bin
      failed_when: false
      changed_when: false
      tags: [claude]

    - name: Install Claude Code (npm global)
      ansible.builtin.command: npm install -g @anthropic-ai/claude-code
      when: claude_bin.rc != 0
      tags: [claude]

    # ---------------------------------------------------------------- repos --
    - name: Ensure dev directory exists
      ansible.builtin.file:
        path: "{{ dev_dir }}"
        state: directory
        mode: "0755"
      tags: [repos]

    - name: Clone GitHub repos
      ansible.builtin.git:
        repo: "https://github.com/{{ item }}.git"
        dest: "{{ dev_dir }}/{{ item.split('/')[1] }}"
        update: false # clone if missing; never clobber local work
      loop: "{{ github_repos }}"
      tags: [repos]

    # --------------------------------------------- in-place config repos -----
    - name: Deploy config repos in place (e.g. ~/.claude)
      ansible.builtin.shell: |
        set -euo pipefail
        DIR="{{ item.dest }}"
        URL="{{ item.url }}"
        if [ -d "$DIR/.git" ]; then
          git -C "$DIR" pull --ff-only
        elif [ -d "$DIR" ]; then
          # adopt an existing non-git dir; repo wins for tracked files,
          # gitignored runtime files (creds/history) are left untouched
          git -C "$DIR" init -q
          git -C "$DIR" remote add origin "$URL" 2>/dev/null || git -C "$DIR" remote set-url origin "$URL"
          git -C "$DIR" fetch -q origin
          git -C "$DIR" checkout -f -B main origin/main
        else
          git clone -q "$URL" "$DIR"
        fi
      args:
        executable: /bin/bash
      loop: "{{ config_repos }}"
      changed_when: false
      tags: [config]

    # ------------------------------------------------------------ hardening --
    - name: Harden the box (firewall, fail2ban, key-only SSH, auto-updates)
      ansible.builtin.import_tasks: tasks/hardening.yml
      tags: [hardening]

    # ------------------------------------------------------------ tailscale --
    - name: Set up Tailscale (private SSH mesh)
      ansible.builtin.import_tasks: tasks/tailscale.yml
      tags: [tailscale]

    # ----------------------------------------------- layali always-on services
    - name: Keep Layali dev services (Metro, admin, Storybook) always-on via pm2
      ansible.builtin.import_tasks: tasks/layali-services.yml
      when: layali_services_enabled | bool
      tags: [layali, services]
