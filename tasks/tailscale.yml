---
# Put SSH on a private Tailscale (WireGuard) mesh so port 22 can leave the
# public internet. Install + firewall are safe to run anytime. Authentication
# and closing port 22 are deliberate steps so you never auto-lock yourself out.
#
# Recommended flow:
#   1. ansible-playbook ... --tags tailscale      # install + allow tailscale0
#   2. tailscale up                               # authenticate (browser URL)
#   3. verify: ssh over the tailnet IP works
#   4. set tailscale_lock_ssh=true, re-run        # then public 22 is removed

- name: Install Tailscale (official script, idempotent)
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Allow inbound traffic on the tailscale interface
  ansible.builtin.command: ufw allow in on tailscale0
  changed_when: false

- name: Bring node onto the tailnet with an auth key (optional, non-interactive)
  ansible.builtin.command: >-
    tailscale up
    --hostname={{ tailscale_hostname }}
    --authkey={{ tailscale_authkey }}
  when: tailscale_authkey | length > 0
  no_log: true

- name: Enable Tailscale SSH — tailnet-identity recovery channel — OPT-IN
  # Authenticates SSH by tailnet identity instead of authorized_keys, so it's
  # immune to the key/StrictModes/fail2ban failure modes that can lock out
  # normal sshd. NOTE: this makes tailscaled take over port 22 on the tailnet
  # interface (the box's host key changes — clients re-trust once), and it
  # REQUIRES an `ssh` rule in the tailnet ACL policy. For an UNATTENDED client
  # (the sshfs Finder mount) the rule's action must be "accept", not "check"
  # ("check" forces periodic browser re-auth, which breaks the mount):
  #   "ssh": [{ "action": "accept", "src": ["autogroup:member"],
  #             "dst": ["autogroup:self"], "users": ["root","autogroup:nonroot"] }]
  # --accept-risk=lose-ssh: the command otherwise aborts when run over a Tailscale
  # connection (it reroutes port 22 mid-flight). Required for non-interactive runs.
  ansible.builtin.command: tailscale set --ssh --accept-risk=lose-ssh
  when: tailscale_ssh | bool
  changed_when: false

- name: Remove public SSH (port 22) from the firewall — OPT-IN lockdown
  ansible.builtin.command: "ufw delete allow {{ ssh_port | default(22) }}/tcp"
  when: tailscale_lock_ssh | bool
  changed_when: false
  failed_when: false
