---
# Box hardening: firewall, intrusion banning, auto-patching, key-only SSH,
# optional non-root user, and optional unattended git credential.
#
# Safety: this NEVER disables password auth unless an SSH key was successfully
# installed from GitHub first — so a misconfig warns instead of locking you out.

# ----------------------------------------------------------- packages --------
- name: Install hardening packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
    state: present

# ------------------------------------------------ automatic security updates -
- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# ----------------------------------------------------------- firewall (ufw) --
# Allow SSH BEFORE enabling, so we don't drop our own connection.
- name: Allow SSH through the firewall
  ansible.builtin.command: "ufw allow {{ ssh_port | default(22) }}/tcp"
  changed_when: false

- name: Default-deny incoming traffic
  ansible.builtin.command: ufw --force default deny incoming
  changed_when: false

- name: Default-allow outgoing traffic
  ansible.builtin.command: ufw --force default allow outgoing
  changed_when: false

- name: Enable the firewall
  ansible.builtin.command: ufw --force enable
  changed_when: false

# --------------------------------------------------------------- fail2ban ----
- name: Configure fail2ban to protect SSH
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    mode: "0644"
    content: |
      [DEFAULT]
      # Never ban loopback or the Tailscale tailnet (100.64.0.0/10): those are
      # YOUR OWN trusted devices reaching the box over the private mesh. A
      # transient key/auth hiccup from your Mac or phone must not get its tailnet
      # IP banned — on a box whose public SSH is already firewalled off, that
      # reads as "Connection refused" and locks you out (exactly what happened).
      ignoreip = 127.0.0.1/8 ::1 100.64.0.0/10

      [sshd]
      enabled = true
      port = {{ ssh_port | default(22) }}
      maxretry = 5
      bantime = 1h
      findtime = 10m
  notify: restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started

# ------------------------------------------------- SSH keys from GitHub ------
- name: Fetch your public SSH keys from GitHub
  ansible.builtin.uri:
    url: "https://github.com/{{ github_keys_user }}.keys"
    return_content: true
  register: gh_keys
  failed_when: false

- name: Record whether usable SSH keys were found
  ansible.builtin.set_fact:
    have_ssh_keys: "{{ gh_keys.status == 200 and (gh_keys.content | trim | length > 0) }}"

- name: Ensure root .ssh dir exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: "0700"
  when: have_ssh_keys

- name: Install root authorized_keys from GitHub
  ansible.builtin.copy:
    dest: /root/.ssh/authorized_keys
    content: "{{ gh_keys.content }}"
    owner: root
    group: root
    mode: "0600"
  when: have_ssh_keys

# ------------------------------------------ optional non-root sudo user ------
- name: Set up non-root admin user
  when: create_admin_user | bool
  block:
    - name: Create admin user
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        shell: /bin/bash
        create_home: true

    - name: Grant passwordless sudo to admin user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-{{ admin_user }}"
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Ensure admin .ssh dir exists
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/.ssh"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0700"

    - name: Install admin authorized_keys from GitHub
      ansible.builtin.copy:
        dest: "/home/{{ admin_user }}/.ssh/authorized_keys"
        content: "{{ gh_keys.content }}"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"
      when: have_ssh_keys

# ----------------------------------------------------- SSH daemon hardening --
- name: Harden sshd (key-only login)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0644"
    content: |
      Port {{ ssh_port | default(22) }}
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      PubkeyAuthentication yes
      ChallengeResponseAuthentication no
  when: disable_password_auth | bool and have_ssh_keys
  notify: restart ssh

- name: WARN — no SSH keys found, leaving password login enabled
  ansible.builtin.debug:
    msg: >-
      No SSH keys at https://github.com/{{ github_keys_user }}.keys —
      password login left ENABLED to avoid lockout. Add a key
      (ssh-keygen, then `gh ssh-key add` or GitHub > Settings > SSH keys),
      then re-run:  ansible-playbook -i inventory.ini site.yml --tags hardening
  when: not have_ssh_keys

# ------------------------------ Docker-published-port firewall (ufw bypass) --
# The Supabase CLI (used for Layali's local e2e stack) publishes every service
# port on 0.0.0.0, and Docker's DNAT rules run BEFORE ufw's filter/INPUT — so
# ufw's default-deny does NOT cover Docker-published ports. Without this, local
# Postgres (54322) and the no-auth Studio are reachable on the public IP. We drop
# external ingress to the Supabase local-dev range (54320-54330) in raw/PREROUTING
# (before DNAT) on the public NIC only; loopback + tailscale are unaffected.
# A boot-time systemd oneshot re-applies it (raw rules don't persist a reboot).
- name: Install the local-dev port firewall script
  ansible.builtin.copy:
    dest: /usr/local/sbin/localdev-firewall.sh
    mode: "0755"
    content: |
      #!/bin/sh
      set -eu
      IF="$(ip -4 route show default | awk '{print $5; exit}')"
      [ -n "$IF" ] || exit 0
      iptables -t raw -C PREROUTING -i "$IF" -p tcp --dport 54320:54330 -j DROP 2>/dev/null \
        || iptables -t raw -I PREROUTING -i "$IF" -p tcp --dport 54320:54330 -j DROP

- name: Install the local-dev firewall systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/localdev-firewall.service
    mode: "0644"
    content: |
      [Unit]
      Description=Block external access to Supabase local-dev ports (Docker/ufw bypass mitigation)
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/localdev-firewall.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

- name: Enable and start the local-dev port firewall
  ansible.builtin.systemd:
    name: localdev-firewall.service
    enabled: true
    state: started
    daemon_reload: true

# --------------------------------- optional unattended git credential (PAT) --
- name: Store fine-grained PAT for unattended git
  when: github_pat | length > 0
  no_log: true
  block:
    - name: Write git credential store (0600, root-only)
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/.git-credentials"
        content: "https://{{ github_keys_user }}:{{ github_pat }}@github.com\n"
        mode: "0600"

    - name: Enable git credential store helper
      ansible.builtin.command: git config --global credential.helper store
      changed_when: false
