# ~/.tmux.conf
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
setw -g mode-keys vi

# Send copied text to the OUTER terminal's clipboard via OSC 52. Works over SSH
# with no X server: tmux emits the escape sequence and the local terminal
# emulator (iTerm2/kitty/WezTerm/Ghostty/Alacritty) writes it to the macOS
# clipboard. The terminal must be allowed to set the clipboard (see README).
set -g set-clipboard on

# Mouse drag-select copies the selection (to the tmux buffer + the system
# clipboard via the OSC 52 above) and exits copy-mode. copy-pipe-and-cancel with
# no shell command uses the built-in copy, which honours set-clipboard.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# quick config reload
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# more intuitive splits
bind | split-window -h
bind - split-window -v

set -g status-style "bg=colour236,fg=colour250"

# --- OSC 133 prompt navigation (needs the shell to emit OSC 133 marks) ---
# Alt+Up / Alt+Down: jump between command outputs in copy-mode.
bind -n M-Up   copy-mode \; send -X previous-prompt -o
bind -n M-Down copy-mode \; send -X next-prompt -o

# prefix + P: select & copy the LAST command's output to the clipboard.
bind P {
  copy-mode
  send -X clear-selection
  send -X previous-prompt -o
  send -X begin-selection
  send -X next-prompt
  send -X cursor-up
  send -X end-of-line
  send -X copy-pipe-and-cancel
}
